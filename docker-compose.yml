version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: widget-redis
    volumes:
      - redis-data:/data

  widget-processor:
    image: widget-processor
    container_name: widget-processor
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    restart: unless-stopped

  widget-gateway:
    image: widget-gateway
    container_name: widget-gateway
    depends_on:
      - redis
    ports:
      - "8083:8083"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: unless-stopped

volumes:
  redis-data:
